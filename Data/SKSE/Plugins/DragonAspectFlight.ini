[Hotkeys]
; DirectInput keyboard scan codes. Decimal and hexadecimal values are both supported.
; Defaults: B = 0x30, Space = 0x39, Left Shift = 0x2A.
Activation=0x30
Ascend=0x39
Descend=0x2A

